name: MLOps Energy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m src.ingestion.fetch_data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY || 'demo' }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      - run: python -m src.features.build_features
      - run: python -m src.models.train_model
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      - run: pytest tests/ || echo "No tests"
      - uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: models/
