name: MLOps Energy Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # Also update this to v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run data ingestion
      env:
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY || 'demo' }}
      run: |
        python src/ingestion/fetch_data.py
    
    - name: Build features
      run: |
        python src/features/build_features.py
    
    - name: Train model
      run: |
        python src/models/train_model.py
    
    - name: Upload artifacts
  uses: actions/upload-artifact@v4
  with:
    name: model-artifacts-${{ github.run_id }}
    path: |
      models/
      data/processed/
      mlruns/
      # Remove frontend/ or change to docs/ if needed
        retention-days: 30

        